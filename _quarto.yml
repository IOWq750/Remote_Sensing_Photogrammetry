project:
  type: book
  output-dir: docs
  resources:
    - images/favicon.ico
    - images/favicon.png

book:
  title: "Основы дистанционного зондирования и фотограмметрии"
  author: "Карпачевский А.М."
  page-navigation: true
  search: true
  repo-url: https://github.com/IOWq750/Remote_Sensing_Photogrammetry
  repo-actions: [edit, issue]
  page-footer:
    center: "© 2020–2026 Карпачевский А.М. Основы дистанционного зондирования и фотограмметрии"
  chapters:
    - index.qmd
    - Ref01_Pansharpening.qmd
    - Ref02_Georeference.qmd
    - Ref03_Mosaicking.qmd
    - Ref12_Photogrammetry.qmd
    - Ref13_Efoto.qmd
    - Ref14_DEM.qmd
    - Ref15_Photomod_aerial.qmd
    - Ref16_Photomod_DEM.qmd
    - Ref17_Photomod_RPC.qmd
    - Ref18_Metashape.qmd
    - Ref20_Metashape_RPC.qmd
    - Ref19_Las.qmd

bibliography:
  - book.bib
  - packages.bib

lang: ru
date: today

format:
  html:
    theme: cosmo
    favicon: images/favicon.ico
    toc: true
    number-sections: true
    link-external-newwindow: true
    css: styles.css
    include-in-header:
      text: |
        <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
        <link rel="shortcut icon" type="image/x-icon" href="./images/favicon.ico">
        <link rel="icon" type="image/png" href="./images/favicon.png">